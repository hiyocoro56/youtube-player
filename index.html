<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nana's Music Player</title>

<style>
/* 全体の背景 */
body { 
  margin: 0; 
  font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif; 
  background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
  color: #f8fafc; 
  min-height: 100vh;
}

#app-container { max-width: 900px; margin: 0 auto; padding: 20px; }

.app-title {
  text-align: center; font-size: 1.5rem; font-weight: bold;
  color: #63AED9; margin-bottom: 20px; letter-spacing: 2px;
}

/* 動画表示エリア */
#player-placeholder {
  width: 100%; aspect-ratio: 16/9; background: #000;
  border-radius: 16px; overflow: hidden;
  box-shadow: 0 10px 30px rgba(0,0,0,0.5); margin-bottom: 20px;
}
#player-area { width: 100%; height: 100%; }

/* 操作パネル */
#controls {
  display: flex; flex-direction: column; gap: 15px; padding: 20px;
  background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px);
  border-radius: 16px; border: 1px solid rgba(255, 255, 255, 0.05);
  margin-bottom: 20px; position: sticky; top: 10px; z-index: 100;
}

.controls-row {
  display: flex; justify-content: center; align-items: center;
  flex-wrap: wrap; gap: 15px;
}

/* お洒落なSVGアイコンボタン */
.player-buttons { display: flex; gap: 12px; align-items: center; }
.player-buttons button {
  display: flex; align-items: center; justify-content: center;
  width: 46px; height: 46px; padding: 0; border-radius: 50%;
  border: 1px solid rgba(99, 174, 217, 0.2); background: rgba(255, 255, 255, 0.05);
  color: #fff; cursor: pointer; transition: all 0.3s ease;
}
.player-buttons button:hover { 
  background: #63AED9; color: #000; box-shadow: 0 0 15px rgba(99, 174, 217, 0.4); transform: scale(1.05);
}
.player-buttons svg { width: 22px; height: 22px; fill: currentColor; }

#shuffleBtn { width: auto; padding: 0 16px; border-radius: 23px; gap: 6px; }
#shuffleText { font-size: 13px; font-weight: bold; }
.volume-wrapper { display: flex; align-items: center; gap: 10px; }
#volume { width: 100px; accent-color: #63AED9; cursor: pointer; }

/* ★ 2画面レイアウト（PCは左右、スマホは上下） ★ */
.panels-wrapper {
  display: flex; flex-direction: column; gap: 20px;
}
@media(min-width: 768px) {
  .panels-wrapper { flex-direction: row; align-items: flex-start; }
}

.panel {
  flex: 1; background: rgba(0, 0, 0, 0.2); border-radius: 16px; padding: 15px;
  border: 1px solid rgba(255, 255, 255, 0.05);
}
.panel-title {
  font-size: 1.1rem; font-weight: bold; margin-bottom: 15px; color: #FFC547;
  display: flex; justify-content: space-between; align-items: center;
}

select {
  width: 100%; padding: 10px; font-size: 14px; font-weight: bold;
  color: #fff; background: rgba(99, 174, 217, 0.15);
  border: 1px solid rgba(99, 174, 217, 0.3); border-radius: 8px;
  outline: none; cursor: pointer; margin-bottom: 10px;
}
select option { background: #1e293b; color: #fff; }

/* 曲リストのアイテム */
.list-container { display: flex; flex-direction: column; gap: 8px; }
.item {
  display: flex; align-items: center; justify-content: space-between;
  padding: 10px 15px; background: rgba(255, 255, 255, 0.03); border-radius: 10px;
  border-left: 4px solid transparent; transition: all 0.2s ease;
}
.item:hover { background: rgba(255, 255, 255, 0.08); }

/* 再生中のハイライト */
.item.active { 
  background: rgba(99, 174, 217, 0.15); border-left: 4px solid #63AED9;
  color: #fff; font-weight: bold; box-shadow: 0 0 10px rgba(99, 174, 217, 0.2);
}

.item-info { flex-grow: 1; cursor: pointer; display: flex; align-items: center; overflow: hidden; }
.track-number { font-size: 0.8rem; opacity: 0.5; margin-right: 10px; font-family: monospace; }
.track-title { font-size: 0.95rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

/* アクションボタン（＋、↑、↓、×） */
.action-btn {
  background: rgba(255,255,255,0.1); border: none; color: white;
  border-radius: 5px; width: 28px; height: 28px; margin-left: 5px;
  cursor: pointer; font-size: 14px; display: flex; align-items: center; justify-content: center;
}
.action-btn:hover { background: #FFC547; color: #000; }
.action-btn.delete:hover { background: #ff4d4d; color: #fff; }

::-webkit-scrollbar { width: 8px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 10px; }

.error-msg {
  background: rgba(255, 0, 0, 0.1); border: 1px solid #ff4d4d;
  color: #ff4d4d; padding: 20px; border-radius: 10px; line-height: 1.6;
}
</style>
</head>

<body>

<div id="app-container">
  <div class="app-title">Nana's Music Player</div>

  <div id="player-placeholder">
    <div id="player-area"><div id="player"></div></div>
  </div>

  <div id="controls">
    <div class="controls-row">
      <div class="player-buttons">
        <button onclick="prev()" title="前へ">
          <svg viewBox="0 0 24 24"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg>
        </button>
        <button onclick="togglePlay()" id="playBtn" title="再生/一時停止">
          <svg id="icon-play" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
          <svg id="icon-pause" viewBox="0 0 24 24" style="display:none;"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
        </button>
        <button onclick="next()" title="次へ">
          <svg viewBox="0 0 24 24"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg>
        </button>
        <button onclick="toggleShuffle()" id="shuffleBtn" title="シャッフル">
          <svg viewBox="0 0 24 24"><path d="M10.59 9.17L5.41 4 4 5.41l5.17 5.17 1.42-1.41zM14.5 4l2.04 2.04L4 18.59 5.41 20 17.96 7.46 20 9.5V4h-5.5zm.33 9.41l-1.41 1.41 3.13 3.13L14.5 20H20v-5.5l-2.04 2.04-3.13-3.13z"/></svg>
          <span id="shuffleText">オフ</span>
        </button>
      </div>
      <div class="volume-wrapper">
        🔊 <input type="range" id="volume" min="0" max="100" value="50">
      </div>
    </div>
  </div>

  <div id="error-container"></div>

  <div class="panels-wrapper" id="main-panels" style="display:none;">
    
    <div class="panel">
      <div class="panel-title">📚 配信アーカイブ</div>
      <select id="playlistSelect"></select>
      <div id="library-list" class="list-container"></div>
    </div>

    <div class="panel">
      <div class="panel-title">
        🎧 マイセトリ
        <button onclick="clearCustom()" style="font-size:12px; padding:5px 10px; border-radius:5px; background:rgba(255,0,0,0.2); color:#ff4d4d; border:1px solid #ff4d4d; cursor:pointer;">全消去</button>
      </div>
      <div id="custom-list" class="list-container"></div>
    </div>

  </div>
</div>

// ★ システム変数 ★
let customPlaylist = [];
let currentPlaylist = [];
let isPlayingCustom = false; // 今どっちのリストを再生しているか
let current = 0;
let player;
let shuffle = false;
let isApiReady = false; 

// ★ セーブデータの読み込み ★
const savedCustom = localStorage.getItem("nanaCustomPlaylist");
if (savedCustom) {
  customPlaylist = JSON.parse(savedCustom);
}

function onYouTubeIframeAPIReady() {
  isApiReady = true;
  tryInitPlayer();
}

function initApp() {
  document.getElementById("main-panels").style.display = "flex";
  
  const firstPlaylistName = Object.keys(myMusicData)[0];
  currentPlaylist = myMusicData[firstPlaylistName];
  isPlayingCustom = false;

  initSelector();
  renderLibrary();
  renderCustom();
  tryInitPlayer();
}

function tryInitPlayer() {
  if (isApiReady && !player) {
    let startVideoId = "b-P-71jE-PI"; // 初期動画
    let startSec = 120;
    
    if(customPlaylist.length > 0) {
        startVideoId = customPlaylist[0].videoId;
        startSec = customPlaylist[0].start;
    } else if (currentPlaylist.length > 0) {
        startVideoId = currentPlaylist[0].videoId;
        startSec = currentPlaylist[0].start;
    }

    player = new YT.Player('player', {
      host: 'https://www.youtube-nocookie.com',
      width: '100%', height: '100%',
      videoId: startVideoId,
      playerVars: { 'playsinline': 1, 'rel': 0 },
      events: {
        'onReady': (event) => {
          event.target.setVolume(50);
          player.cueVideoById({ videoId: startVideoId, startSeconds: startSec });
        },
        'onStateChange': onPlayerStateChange
      }
    });
  }
}

// ドロップダウンの設定
function initSelector() {
  const sel = document.getElementById("playlistSelect");
  sel.innerHTML = ""; 
  Object.keys(myMusicData).forEach(name => {
    const opt = document.createElement("option");
    opt.value = name; opt.textContent = name;
    sel.appendChild(opt);
  });
  
  sel.onchange = () => {
    currentPlaylist = myMusicData[sel.value];
    isPlayingCustom = false;
    current = 0;
    renderLibrary();
    updateUI();
  };
}

// ★ 倉庫（左側）の描画 ★
function renderLibrary() {
  const list = document.getElementById("library-list");
  list.innerHTML = "";
  
  let targetData = myMusicData[document.getElementById("playlistSelect").value];
  
  targetData.forEach((item, i) => {
    const div = document.createElement("div");
    div.className = "item" + (!isPlayingCustom && i === current ? " active" : "");
    
    const info = document.createElement("div");
    info.className = "item-info";
    info.onclick = () => {
        currentPlaylist = targetData;
        isPlayingCustom = false;
        loadTrack(i);
    };
    info.innerHTML = `<span class="track-number">${String(i + 1).padStart(2, '0')}</span><span class="track-title">${item.title}</span>`;
    
    const addBtn = document.createElement("button");
    addBtn.className = "action-btn";
    addBtn.textContent = "＋";
    addBtn.title = "マイセトリに追加";
    addBtn.onclick = (e) => {
        e.stopPropagation();
        customPlaylist.push(item);
        saveAndRenderCustom();
    };

    div.appendChild(info);
    div.appendChild(addBtn);
    list.appendChild(div);
  });
}

// ★ マイセトリ（右側）の描画 ★
function renderCustom() {
  const list = document.getElementById("custom-list");
  list.innerHTML = "";
  
  if (customPlaylist.length === 0) {
    list.innerHTML = "<div style='opacity:0.5; font-size:14px; text-align:center; padding:20px;'>左のリストから「＋」を押して<br>曲を追加してね！</div>";
    return;
  }

  customPlaylist.forEach((item, i) => {
    const div = document.createElement("div");
    div.className = "item" + (isPlayingCustom && i === current ? " active" : "");
    
    const info = document.createElement("div");
    info.className = "item-info";
    info.onclick = () => {
        currentPlaylist = customPlaylist;
        isPlayingCustom = true;
        loadTrack(i);
    };
    info.innerHTML = `<span class="track-number">${String(i + 1).padStart(2, '0')}</span><span class="track-title">${item.title}</span>`;
    
    const controls = document.createElement("div");
    controls.style.display = "flex";

    // 上へボタン
    if (i > 0) {
        const upBtn = document.createElement("button");
        upBtn.className = "action-btn"; upBtn.textContent = "↑";
        upBtn.onclick = (e) => { e.stopPropagation(); moveCustom(i, -1); };
        controls.appendChild(upBtn);
    }
    // 下へボタン
    if (i < customPlaylist.length - 1) {
        const downBtn = document.createElement("button");
        downBtn.className = "action-btn"; downBtn.textContent = "↓";
        downBtn.onclick = (e) => { e.stopPropagation(); moveCustom(i, 1); };
        controls.appendChild(downBtn);
    }
    // 削除ボタン
    const delBtn = document.createElement("button");
    delBtn.className = "action-btn delete"; delBtn.textContent = "×";
    delBtn.onclick = (e) => { e.stopPropagation(); removeCustom(i); };
    controls.appendChild(delBtn);

    div.appendChild(info);
    div.appendChild(controls);
    list.appendChild(div);
  });
}

// マイセトリの操作関数
function saveAndRenderCustom() {
  localStorage.setItem("nanaCustomPlaylist", JSON.stringify(customPlaylist));
  renderCustom();
}

function moveCustom(index, direction) {
  const temp = customPlaylist[index];
  customPlaylist[index] = customPlaylist[index + direction];
  customPlaylist[index + direction] = temp;
  if(isPlayingCustom) {
      if(current === index) current += direction;
      else if(current === index + direction) current -= direction;
  }
  saveAndRenderCustom();
}

function removeCustom(index) {
  customPlaylist.splice(index, 1);
  if(isPlayingCustom) {
      if(current > index) current--;
      else if(current === index) {
          if(customPlaylist.length === 0) { player.stopVideo(); }
          else { current = current % customPlaylist.length; loadTrack(current); }
      }
  }
  saveAndRenderCustom();
}

function clearCustom() {
  if(confirm("マイセトリをすべて消去しますか？")) {
    customPlaylist = [];
    if(isPlayingCustom) { player.stopVideo(); }
    saveAndRenderCustom();
    updateUI();
  }
}

// プレイヤー制御
function loadTrack(i) {
  current = i;
  const item = currentPlaylist[i];
  if(player && player.loadVideoById){
      player.loadVideoById({ videoId: item.videoId, startSeconds: item.start });
  }
  updateUI();
}

function togglePlay() {
  if(!player) return;
  if (player.getPlayerState() === 1) {
    player.pauseVideo();
    document.getElementById("icon-play").style.display = "block";
    document.getElementById("icon-pause").style.display = "none";
  } else {
    player.playVideo();
    document.getElementById("icon-play").style.display = "none";
    document.getElementById("icon-pause").style.display = "block";
  }
}

function next() {
  if(currentPlaylist.length === 0) return;
  let nextIdx = shuffle ? Math.floor(Math.random() * currentPlaylist.length) : (current + 1) % currentPlaylist.length;
  loadTrack(nextIdx);
}

function prev() {
  if(currentPlaylist.length === 0) return;
  let prevIdx = (current - 1 + currentPlaylist.length) % currentPlaylist.length;
  loadTrack(prevIdx);
}

function toggleShuffle() {
  shuffle = !shuffle;
  document.getElementById("shuffleText").textContent = shuffle ? "オン" : "オフ";
  document.getElementById("shuffleBtn").style.color = shuffle ? "#FFC547" : "#fff";
}

function onPlayerStateChange(event) {
  if (event.data === YT.PlayerState.PLAYING) {
    document.getElementById("icon-play").style.display = "none";
    document.getElementById("icon-pause").style.display = "block";
    
    clearInterval(window._timer);
    window._timer = setInterval(() => {
      if(currentPlaylist.length === 0) return;
      const item = currentPlaylist[current];
      const now = player.getCurrentTime();
      if (item.end && now >= item.end) { next(); }
    }, 1000);
  } else {
    document.getElementById("icon-play").style.display = "block";
    document.getElementById("icon-pause").style.display = "none";
    clearInterval(window._timer);
  }
}

function updateUI() {
  renderLibrary();
  renderCustom();
}

document.getElementById("volume").oninput = e => { if(player) player.setVolume(e.target.value); };

window.onload = function() {
  try {
    initApp();
  } catch (error) {
    console.error("Error:", error);
  }
};
</script>
</body>
</html>
