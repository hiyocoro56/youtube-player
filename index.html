<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nana's Music Player</title>

<style>
/* 1. 全体の背景（高級感のあるダークグラデーション） */
body { 
  margin: 0; 
  font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif; 
  background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
  color: #f8fafc; 
  min-height: 100vh;
}

/* 2. アプリ全体の枠組み（中央寄せでスッキリ見せる） */
#app-container {
  max-width: 700px;
  margin: 0 auto;
  padding: 20px;
}

/* タイトルロゴ風 */
.app-title {
  text-align: center;
  font-size: 1.5rem;
  font-weight: bold;
  color: #63AED9;
  margin-bottom: 20px;
  letter-spacing: 2px;
}

/* 3. 動画表示エリア（角丸にして柔らかく） */
#player-wrapper {
  width: 100%;
  aspect-ratio: 16/9;
  background: #000;
  border-radius: 16px;
  overflow: hidden;
  box-shadow: 0 10px 30px rgba(0,0,0,0.5);
  margin-bottom: 20px;
}

/* 4. 操作パネル（ガラスのような半透明デザイン） */
#controls {
  display: flex;
  flex-direction: column;
  gap: 15px;
  padding: 20px;
  background: rgba(255, 255, 255, 0.03);
  backdrop-filter: blur(10px);
  border-radius: 16px;
  border: 1px solid rgba(255, 255, 255, 0.05);
  margin-bottom: 20px;
  position: sticky;
  top: 10px;
  z-index: 100;
}

.controls-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  flex-wrap: wrap;
  gap: 10px;
}

/* プルダウンメニューのお洒落化 */
select {
  flex-grow: 1;
  padding: 12px 15px;
  font-size: 15px;
  font-weight: bold;
  color: #fff;
  background: rgba(99, 174, 217, 0.15);
  border: 1px solid rgba(99, 174, 217, 0.3);
  border-radius: 8px;
  outline: none;
  cursor: pointer;
}
select option { background: #1e293b; color: #fff; }

/* ボタンのお洒落化 */
button {
  padding: 12px 20px;
  font-size: 16px;
  cursor: pointer;
  border-radius: 50px;
  border: 1px solid rgba(255, 255, 255, 0.1);
  background: rgba(255, 255, 255, 0.05);
  color: #fff;
  transition: all 0.3s ease;
}
button:hover { 
  background: #63AED9; 
  color: #000;
  box-shadow: 0 0 15px rgba(99, 174, 217, 0.5);
  border-color: transparent;
}

/* 5. 音量スライダー */
.volume-wrapper {
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 18px;
}
#volume { 
  width: 100px; 
  accent-color: #63AED9; 
  cursor: pointer;
}

/* 6. 曲リストのお洒落化 */
#list { 
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.item {
  display: flex;
  align-items: center;
  padding: 16px 20px;
  background: rgba(255, 255, 255, 0.02);
  border-radius: 12px;
  cursor: pointer;
  border-left: 4px solid transparent; 
  transition: all 0.3s ease;
}
.item:hover { 
  background: rgba(255, 255, 255, 0.06); 
  transform: translateX(5px); 
}

/* 再生中の曲のハイライト（黄色） */
.item.active { 
  background: rgba(255, 197, 71, 0.1);
  border-left: 4px solid #FFC547;
  color: #FFC547; 
  font-weight: bold;
  box-shadow: 0 4px 15px rgba(255, 197, 71, 0.1);
}

.track-number {
  font-size: 0.9rem;
  opacity: 0.5;
  margin-right: 15px;
  font-family: monospace;
}

/* エラーメッセージ用のデザイン */
.error-msg {
  background: rgba(255, 0, 0, 0.1);
  border: 1px solid #ff4d4d;
  color: #ff4d4d;
  padding: 20px;
  border-radius: 10px;
  line-height: 1.6;
}

::-webkit-scrollbar { width: 8px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 10px; }
::-webkit-scrollbar-thumb:hover { background: #63AED9; }
</style>
</head>

<body>

<div id="app-container">
  <div class="app-title">Nana's Music Player</div>

  <div id="player-wrapper">
    <div id="player"></div>
  </div>

  <div id="controls">
    <select id="playlistSelect"></select>
    
    <div class="controls-row">
      <div>
        <button onclick="prev()">⏮</button>
        <button onclick="togglePlay()" id="playBtn">▶/⏸</button>
        <button onclick="next()">⏭</button>
        <button onclick="toggleShuffle()" id="shuffleBtn" style="font-size:13px;">🔀 オフ</button>
      </div>
      <div class="volume-wrapper">
        🔊 <input type="range" id="volume" min="0" max="100" value="50">
      </div>
    </div>
  </div>

  <div id="list"></div>
</div>

<script src="https://www.youtube.com/iframe_api"></script>

<script>
// ★ 曲のデータ ★

    { "title": "ウィーアー!", "videoId": "b-P-71jE-PI", "start": 3739, "end": 4100 }
  ],

    { "title": "乱舞のメロディ", "videoId": "A2SdplCJEeA", "start": 4272, "end": 4587 },
    { "title": "らしさ", "videoId": "A2SdplCJEeA", "start": 4587, "end": 5026 },
    { "title": "ともよ", "videoId": "A2SdplCJEeA", "start": 5026, "end": 5432 },
    { "title": "全力少年", "videoId": "A2SdplCJEeA", "start": 5432, "end": 5734 },
    { "title": "僕らまた", "videoId": "A2SdplCJEeA", "start": 5734, "end": 6031 },
    { "title": "more than words", "videoId": "A2SdplCJEeA", "start": 6031, "end": 6426 },
    { "title": "春の歌", "videoId": "A2SdplCJEeA", "start": 6426, "end": 6787 },

    { "title": "ファンファーレ", "videoId": "A2SdplCJEeA", "start": 7236, "end": 7525 },
    { "title": "心なし", "videoId": "A2SdplCJEeA", "start": 7525, "end": 7869 },
    { "title": "アイロニ", "videoId": "A2SdplCJEeA", "start": 7869, "end": 8258 },
    { "title": "I beg you", "videoId": "A2SdplCJEeA", "start": 8258, "end": 8633 },
    { "title": "春はゆく", "videoId": "A2SdplCJEeA", "start": 8633, "end": 9060 },
    { "title": "タバコ", "videoId": "A2SdplCJEeA", "start": 9060, "end": 9496 },
    { "title": "ガーネット", "videoId": "A2SdplCJEeA", "start": 9496, "end": 9851 },
    { "title": "Beautiful World", "videoId": "A2SdplCJEeA", "start": 9851, "end": 10193 },
    { "title": "Ghost of a smile", "videoId": "A2SdplCJEeA", "start": 10193, "end": 10582 },
    { "title": "世界の約束", "videoId": "A2SdplCJEeA", "start": 10582, "end": 10861 },
    { "title": "プラチナ", "videoId": "A2SdplCJEeA", "start": 10861, "end": 11322 },
    { "title": "い", "videoId": "A2SdplCJEeA", "start": 11322, "end": 11635 }
  ]
};

let playlist = [];
let current = 0;
let player;
let shuffle = false;
let isApiReady = false; 

function initApp() {
  const firstPlaylistName = Object.keys(myMusicData)[0];
  playlist = myMusicData[firstPlaylistName];
  initSelector();
  createList(); 
}

function onYouTubeIframeAPIReady() {
  isApiReady = true;
  tryInitPlayer();
}

function tryInitPlayer() {
  if (isApiReady && playlist.length > 0 && !player) {
    player = new YT.Player('player', {
      host: 'https://www.youtube-nocookie.com',
      width: '100%',
      height: '100%',
      videoId: playlist[0].videoId,
      playerVars: { 'playsinline': 1, 'rel': 0 },
      events: {
        'onReady': (event) => {
          event.target.setVolume(50);
          current = 0;
          player.cueVideoById({
            videoId: playlist[0].videoId,
            startSeconds: playlist[0].start
          });
          updateUI();
        },
        'onStateChange': onPlayerStateChange
      }
    });
  }
}

function initSelector() {
  const sel = document.getElementById("playlistSelect");
  sel.innerHTML = ""; 
  Object.keys(myMusicData).forEach(name => {
    const opt = document.createElement("option");
    opt.value = name;
    opt.textContent = name;
    sel.appendChild(opt);
  });
  sel.onchange = () => {
    playlist = myMusicData[sel.value];
    current = 0;
    createList();
    if(player && player.loadVideoById){
        player.loadVideoById({
          videoId: playlist[0].videoId,
          startSeconds: playlist[0].start
        });
    }
    updateUI();
  };
}

function loadTrack(i) {
  current = i;
  const item = playlist[i];
  if(player && player.loadVideoById){
      player.loadVideoById({
        videoId: item.videoId,
        startSeconds: item.start
      });
  }
  updateUI();
}

function togglePlay() {
  if(!player) return;
  const s = player.getPlayerState();
  if (s === 1) player.pauseVideo();
  else player.playVideo();
}

function next() {
  let nextIdx = shuffle ? Math.floor(Math.random() * playlist.length) : (current + 1) % playlist.length;
  loadTrack(nextIdx);
}

function prev() {
  let prevIdx = (current - 1 + playlist.length) % playlist.length;
  loadTrack(prevIdx);
}

function toggleShuffle() {
  shuffle = !shuffle;
  document.getElementById("shuffleBtn").textContent = shuffle ? "🔀 オン" : "🔀 オフ";
  document.getElementById("shuffleBtn").style.color = shuffle ? "#FFC547" : "#fff";
}

function onPlayerStateChange(event) {
  if (event.data === YT.PlayerState.PLAYING) {
    clearInterval(window._timer);
    window._timer = setInterval(() => {
      const item = playlist[current];
      const now = player.getCurrentTime();
      if (item.end && now >= item.end) {
        next();
      }
    }, 1000);
  } else {
    clearInterval(window._timer);
  }
}

function createList() {
  const list = document.getElementById("list");
  list.innerHTML = "";
  playlist.forEach((item, i) => {
    const div = document.createElement("div");
    div.className = "item";
    
    const num = document.createElement("span");
    num.className = "track-number";
    num.textContent = String(i + 1).padStart(2, '0');
    
    const title = document.createElement("span");
    title.textContent = item.title;
    
    div.appendChild(num);
    div.appendChild(title);
    
    div.onclick = () => loadTrack(i);
    list.appendChild(div);
  });
  updateUI();
}

function updateUI() {
  const items = document.querySelectorAll(".item");
  items.forEach((el, i) => {
    el.classList.toggle("active", i === current);
  });
}

document.getElementById("volume").oninput = e => {
  if(player) player.setVolume(e.target.value);
};

// ★ 安全装置：エラーがあれば画面に表示する ★
window.onload = function() {
  try {
    initApp();
  } catch (error) {
    document.getElementById("list").innerHTML = `<div class="error-msg"><b>【エラー】プログラムの読み込みに失敗しました。</b><br>コードのコピー漏れや、不要な文字が混ざっていないか確認してください。<br><br>詳細: ${error.message}</div>`;
  }
};
</script>
</body>
</html>
