<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Music App</title>

<style>
body { margin:0; font-family:sans-serif; background:#111; color:white; }

#player-area {
  width:100%;
  aspect-ratio:16/9;
  background:black;
  position:relative;
}
#player-area.mini {
  position:fixed;
  width:160px;
  height:90px;
  bottom:10px;
  right:10px;
  z-index:1000;
}

#controls {
  display:flex;
  flex-wrap:wrap;
  gap:5px;
  padding:10px;
  background:#222;
  position:sticky;
  top:0;
}

button, select {
  padding:8px;
  font-size:14px;
}

#volume {
  width:100px;
}

#list { padding:10px; }
.item {
  padding:12px;
  background:#333;
  margin-bottom:6px;
  border-radius:8px;
}
.item.active { background:#4dabf7; color:black; }
</style>
</head>

<body>

<div id="player-area">
  <div id="player"></div>
</div>

<div id="controls">
  <select id="playlistSelect"></select>
  <button onclick="prev()">⏮</button>
  <button onclick="togglePlay()">▶/⏸</button>
  <button onclick="next()">⏭</button>
  <button onclick="toggleShuffle()">🔀</button>
  <button onclick="toggleLoop()">🔁</button>
  🔊 <input type="range" id="volume" min="0" max="100" value="50">
</div>

<div id="list"></div>

<script src="https://www.youtube.com/iframe_api"></script>

<script>
let playlists = {};
let playlist = [];
let current = 0;
let player;
let shuffle=false, loop=false;

// JSON読み込み（自動）
fetch("playlists.json")
.then(res => res.json())
.then(data => {
  playlists = data;
  initSelector();
  loadPlaylist(Object.keys(playlists)[0]);
});

// プレイリスト切替
function loadPlaylist(name){
  playlist = playlists[name];
  current = 0;
  createList();
  play(0);
}

// セレクタ
function initSelector(){
  const sel = document.getElementById("playlistSelect");
  Object.keys(playlists).forEach(name=>{
    const opt = document.createElement("option");
    opt.value=name;
    opt.textContent=name;
    sel.appendChild(opt);
  });
  sel.onchange=()=>loadPlaylist(sel.value);
}

// YouTube
function onYouTubeIframeAPIReady(){
  player = new YT.Player('player',{
    width: '100%',
    height: '100%',
    videoId: playlist[0].videoId, // ← 最初の動画を指定
    events:{
      onReady: () => {
        play(0); // ← 最初の曲を再生
      },
      onStateChange: onState
    }
  });
}

// 再生
function play(i){
  current=i;
  const item=playlist[i];
  player.loadVideoById({
    videoId:item.videoId,
    startSeconds:item.start
  });
  updateUI();
}

// 再生制御
function togglePlay(){
  const s=player.getPlayerState();
  if(s===1) player.pauseVideo();
  else player.playVideo();
}
function next(){
  if(shuffle) current=Math.floor(Math.random()*playlist.length);
  else current=(current+1)%playlist.length;
  play(current);
}
function prev(){
  current=(current-1+playlist.length)%playlist.length;
  play(current);
}

// 終了時間管理（ここが重要）
function onState(){
  clearInterval(window._timer);
  window._timer=setInterval(()=>{
    const item=playlist[current];
    if(!item.end) return;
    const t=player.getCurrentTime();
    if(t>=item.end){
      if(loop) play(current);
      else next();
    }
  },500);
}

// UI
function createList(){
  const list=document.getElementById("list");
  list.innerHTML="";
  playlist.forEach((item,i)=>{
    const div=document.createElement("div");
    div.className="item";
    div.textContent=item.title;
    div.onclick=()=>play(i);
    list.appendChild(div);
  });
}
function updateUI(){
  document.querySelectorAll(".item").forEach((el,i)=>{
    el.classList.toggle("active",i===current);
  });
}

// 音量
document.getElementById("volume").oninput=e=>{
  player.setVolume(e.target.value);
};

// ミニプレイヤー
window.addEventListener("scroll",()=>{
  const rect=document.getElementById("player-area").getBoundingClientRect();
  if(rect.bottom<0) document.getElementById("player-area").classList.add("mini");
  else document.getElementById("player-area").classList.remove("mini");
});
</script>

</body>
</html>
