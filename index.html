<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nana's Music Player</title>

<style>
/* 1. 全体の背景（高級感のあるダークグラデーション） */
body { 
  margin: 0; 
  font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif; 
  background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
  color: #f8fafc; 
  min-height: 100vh;
}

/* 2. アプリ全体の枠組み（中央寄せでスッキリ見せる） */
#app-container {
  max-width: 700px;
  margin: 0 auto;
  padding: 20px;
}

/* タイトルロゴ風 */
.app-title {
  text-align: center;
  font-size: 1.5rem;
  font-weight: bold;
  color: #63AED9;
  margin-bottom: 20px;
  letter-spacing: 2px;
}

/* 3. 動画表示エリア（角丸にして柔らかく） */
#player-wrapper {
  width: 100%;
  aspect-ratio: 16/9;
  background: #000;
  border-radius: 16px;
  overflow: hidden;
  box-shadow: 0 10px 30px rgba(0,0,0,0.5);
  margin-bottom: 20px;
}

/* 4. 操作パネル（ガラスのような半透明デザイン） */
#controls {
  display: flex;
  flex-direction: column;
  gap: 15px;
  padding: 20px;
  background: rgba(255, 255, 255, 0.03);
  backdrop-filter: blur(10px);
  border-radius: 16px;
  border: 1px solid rgba(255, 255, 255, 0.05);
  margin-bottom: 20px;
  position: sticky;
  top: 10px;
  z-index: 100;
}

.controls-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  flex-wrap: wrap;
  gap: 10px;
}

/* プルダウンメニューのお洒落化 */
select {
  flex-grow: 1;
  padding: 12px 15px;
  font-size: 15px;
  font-weight: bold;
  color: #fff;
  background: rgba(99, 174, 217, 0.15);
  border: 1px solid rgba(99, 174, 217, 0.3);
  border-radius: 8px;
  outline: none;
  cursor: pointer;
}
select option { background: #1e293b; color: #fff; }

/* ボタンのお洒落化 */
button {
  padding: 12px 20px;
  font-size: 16px;
  cursor: pointer;
  border-radius: 50px;
  border: 1px solid rgba(255, 255, 255, 0.1);
  background: rgba(255, 255, 255, 0.05);
  color: #fff;
  transition: all 0.3s ease;
}
button:hover { 
  background: #63AED9; 
  color: #000;
  box-shadow: 0 0 15px rgba(99, 174, 217, 0.5);
  border-color: transparent;
}

/* 5. 音量スライダー */
.volume-wrapper {
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 18px;
}
#volume { 
  width: 100px; 
  accent-color: #63AED9; 
  cursor: pointer;
}

/* 6. 曲リストのお洒落化 */
#list { 
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.item {
  display: flex;
  align-items: center;
  padding: 16px 20px;
  background: rgba(255, 255, 255, 0.02);
  border-radius: 12px;
  cursor: pointer;
  border-left: 4px solid transparent; 
  transition: all 0.3s ease;
}
.item:hover { 
  background: rgba(255, 255, 255, 0.06); 
  transform: translateX(5px); 
}

/* 再生中の曲のハイライト（黄色） */
.item.active { 
  background: rgba(255, 197, 71, 0.1);
  border-left: 4px solid #FFC547;
  color: #FFC547; 
  font-weight: bold;
  box-shadow: 0 4px 15px rgba(255, 197, 71, 0.1);
}

.track-number {
  font-size: 0.9rem;
  opacity: 0.5;
  margin-right: 15px;
  font-family: monospace;
}

/* エラーメッセージ用のデザイン */
.error-msg {
  background: rgba(255, 0, 0, 0.1);
  border: 1px solid #ff4d4d;
  color: #ff4d4d;
  padding: 20px;
  border-radius: 10px;
  line-height: 1.6;
}

::-webkit-scrollbar { width: 8px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 10px; }
::-webkit-scrollbar-thumb:hover { background: #63AED9; }
</style>
</head>

<body>

<div id="app-container">
  <div class="app-title">Nana's Music Player</div>

  <div id="player-wrapper">
    <div id="player"></div>
  </div>

  <div id="controls">
    <select id="playlistSelect"></select>
    
    <div class="controls-row">
      <div>
        <button onclick="prev()">⏮</button>
        <button onclick="togglePlay()" id="playBtn">▶/⏸</button>
        <button onclick="next()">⏭</button>
        <button onclick="toggleShuffle()" id="shuffleBtn" style="font-size:13px;">🔀 オフ</button>
      </div>
      <div class="volume-wrapper">
        🔊 <input type="range" id="volume" min="0" max="100" value="50">
      </div>
    </div>
  </div>

  <div id="list"></div>
</div>

<script src="https://www.youtube.com/iframe_api"></script>
