<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nana's Music Player</title>

<style>
/* 1. 全体の背景 */
body { 
  margin: 0; 
  font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif; 
  background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
  color: #f8fafc; 
  min-height: 100vh;
}

/* 2. アプリ全体の枠組み */
#app-container {
  max-width: 700px;
  margin: 0 auto;
  padding: 20px;
}

.app-title {
  text-align: center;
  font-size: 1.5rem;
  font-weight: bold;
  color: #63AED9;
  margin-bottom: 20px;
  letter-spacing: 2px;
}

/* 3. 動画表示エリア */
#player-placeholder {
  width: 100%;
  aspect-ratio: 16/9;
  background: #000;
  border-radius: 16px;
  overflow: hidden;
  box-shadow: 0 10px 30px rgba(0,0,0,0.5);
  margin-bottom: 20px;
}

#player-area { width: 100%; height: 100%; }

/* 4. 操作パネル */
#controls {
  display: flex;
  flex-direction: column;
  gap: 15px;
  padding: 20px;
  background: rgba(255, 255, 255, 0.03);
  backdrop-filter: blur(10px);
  border-radius: 16px;
  border: 1px solid rgba(255, 255, 255, 0.05);
  margin-bottom: 20px;
  position: sticky;
  top: 10px;
  z-index: 100;
}

.controls-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  flex-wrap: wrap;
  gap: 15px;
}

select {
  flex-grow: 1;
  padding: 12px 15px;
  font-size: 15px;
  font-weight: bold;
  color: #fff;
  background: rgba(99, 174, 217, 0.15);
  border: 1px solid rgba(99, 174, 217, 0.3);
  border-radius: 8px;
  outline: none;
  cursor: pointer;
}
select option { background: #1e293b; color: #fff; }

.player-buttons {
  display: flex;
  gap: 12px;
  align-items: center;
}

.player-buttons button {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 46px;
  height: 46px;
  padding: 0;
  border-radius: 50%;
  border: 1px solid rgba(99, 174, 217, 0.2);
  background: rgba(255, 255, 255, 0.05);
  color: #fff;
  cursor: pointer;
  transition: all 0.3s ease;
}

.player-buttons button:hover { 
  background: #63AED9; 
  color: #000;
  box-shadow: 0 0 15px rgba(99, 174, 217, 0.4);
  transform: scale(1.05);
}

.player-buttons svg {
  width: 22px;
  height: 22px;
  fill: currentColor;
}

#shuffleBtn {
  width: auto;
  padding: 0 16px;
  border-radius: 23px;
  gap: 6px;
}

#shuffleText {
  font-size: 13px;
  font-weight: bold;
}

.volume-wrapper { display: flex; align-items: center; gap: 10px; }
#volume { width: 100px; accent-color: #63AED9; cursor: pointer; }

/* 曲リスト */
#list { display: flex; flex-direction: column; gap: 10px; }

.item {
  display: flex;
  align-items: center;
  padding: 16px 20px;
  background: rgba(255, 255, 255, 0.02);
  border-radius: 12px;
  cursor: pointer;
  border-left: 4px solid transparent; 
  transition: all 0.3s ease;
}
.item:hover { background: rgba(255, 255, 255, 0.06); transform: translateX(5px); }

.item.active { 
  background: rgba(255, 197, 71, 0.1);
  border-left: 4px solid #FFC547;
  color: #FFC547; 
  font-weight: bold;
  box-shadow: 0 4px 15px rgba(255, 197, 71, 0.1);
}

.track-number { font-size: 0.9rem; opacity: 0.5; margin-right: 15px; font-family: monospace; }

::-webkit-scrollbar { width: 8px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 10px; }
::-webkit-scrollbar-thumb:hover { background: #63AED9; }

.error-msg {
  background: rgba(255, 0, 0, 0.1);
  border: 1px solid #ff4d4d;
  color: #ff4d4d;
  padding: 20px;
  border-radius: 10px;
}
</style>
</head>

<body>

<div id="app-container">
  <div class="app-title">Nana's Music Player</div>

  <div id="player-placeholder">
    <div id="player-area"><div id="player"></div></div>
  </div>

  <div id="controls">
    <select id="playlistSelect"></select>
    
    <div class="controls-row">
      <div class="player-buttons">
        <button onclick="prev()" title="前へ">
          <svg viewBox="0 0 24 24"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg>
        </button>
        <button onclick="togglePlay()" id="playBtn" title="再生/一時停止">
          <svg id="icon-play" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
          <svg id="icon-pause" viewBox="0 0 24 24" style="display:none;"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
        </button>
        <button onclick="next()" title="次へ">
          <svg viewBox="0 0 24 24"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg>
        </button>
        <button onclick="toggleShuffle()" id="shuffleBtn" title="シャッフル">
          <svg viewBox="0 0 24 24"><path d="M10.59 9.17L5.41 4 4 5.41l5.17 5.17 1.42-1.41zM14.5 4l2.04 2.04L4 18.59 5.41 20 17.96 7.46 20 9.5V4h-5.5zm.33 9.41l-1.41 1.41 3.13 3.13L14.5 20H20v-5.5l-2.04 2.04-3.13-3.13z"/></svg>
          <span id="shuffleText">オフ</span>
        </button>
      </div>
      <div class="volume-wrapper">
        🔊 <input type="range" id="volume" min="0" max="100" value="50">
      </div>
    </div>
  </div>

  <div id="list"></div>
</div>

<script src="https://www.youtube.com/iframe_api"></script>
