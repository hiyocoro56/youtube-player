<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nana's Music Player</title>

<style>
/* 1. 全体の背景（高級感のあるダークグラデーション） */
body { 
  margin: 0; 
  font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif; 
  background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
  color: #f8fafc; 
  min-height: 100vh;
}

/* 2. アプリ全体の枠組み */
#app-container {
  max-width: 700px;
  margin: 0 auto;
  padding: 20px;
}

.app-title {
  text-align: center;
  font-size: 1.5rem;
  font-weight: bold;
  color: #63AED9;
  margin-bottom: 20px;
  letter-spacing: 2px;
}

/* 3. 動画表示エリア */
#player-placeholder {
  width: 100%;
  aspect-ratio: 16/9;
  background: #000;
  border-radius: 16px;
  overflow: hidden;
  box-shadow: 0 10px 30px rgba(0,0,0,0.5);
  margin-bottom: 20px;
}

#player-area { width: 100%; height: 100%; }

/* 4. 操作パネル（ガラスのような透明感） */
#controls {
  display: flex;
  flex-direction: column;
  gap: 15px;
  padding: 20px;
  background: rgba(255, 255, 255, 0.03);
  backdrop-filter: blur(10px);
  border-radius: 16px;
  border: 1px solid rgba(255, 255, 255, 0.05);
  margin-bottom: 20px;
  position: sticky;
  top: 10px;
  z-index: 100;
}

.controls-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  flex-wrap: wrap;
  gap: 15px;
}

select {
  flex-grow: 1;
  padding: 12px 15px;
  font-size: 15px;
  font-weight: bold;
  color: #fff;
  background: rgba(99, 174, 217, 0.15);
  border: 1px solid rgba(99, 174, 217, 0.3);
  border-radius: 8px;
  outline: none;
  cursor: pointer;
}
select option { background: #1e293b; color: #fff; }

/* お洒落なSVGアイコンボタン */
.player-buttons {
  display: flex;
  gap: 12px;
  align-items: center;
}

.player-buttons button {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 46px;
  height: 46px;
  padding: 0;
  border-radius: 50%;
  border: 1px solid rgba(99, 174, 217, 0.2);
  background: rgba(255, 255, 255, 0.05);
  color: #fff;
  cursor: pointer;
  transition: all 0.3s ease;
}

.player-buttons button:hover { 
  background: #63AED9; 
  color: #000;
  box-shadow: 0 0 15px rgba(99, 174, 217, 0.4);
  transform: scale(1.05);
}

.player-buttons svg {
  width: 22px;
  height: 22px;
  fill: currentColor;
}

#shuffleBtn {
  width: auto;
  padding: 0 16px;
  border-radius: 23px;
  gap: 6px;
}

#shuffleText {
  font-size: 13px;
  font-weight: bold;
}

.volume-wrapper { display: flex; align-items: center; gap: 10px; }
#volume { width: 100px; accent-color: #63AED9; cursor: pointer; }

/* 曲リスト */
#list { display: flex; flex-direction: column; gap: 10px; }

.item {
  display: flex;
  align-items: center;
  padding: 16px 20px;
  background: rgba(255, 255, 255, 0.02);
  border-radius: 12px;
  cursor: pointer;
  border-left: 4px solid transparent; 
  transition: all 0.3s ease;
}
.item:hover { background: rgba(255, 255, 255, 0.06); transform: translateX(5px); }

/* アクティブ（再生中）の曲は黄色でハイライト */
.item.active { 
  background: rgba(255, 197, 71, 0.1);
  border-left: 4px solid #FFC547;
  color: #FFC547; 
  font-weight: bold;
  box-shadow: 0 4px 15px rgba(255, 197, 71, 0.1);
}

.track-number { font-size: 0.9rem; opacity: 0.5; margin-right: 15px; font-family: monospace; }

::-webkit-scrollbar { width: 8px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 10px; }
::-webkit-scrollbar-thumb:hover { background: #63AED9; }

.error-msg {
  background: rgba(255, 0, 0, 0.1);
  border: 1px solid #ff4d4d;
  color: #ff4d4d;
  padding: 20px;
  border-radius: 10px;
}
</style>
</head>

<div id="app-container">
  <div class="app-title">Nana's Music Player</div>

  <div id="player-placeholder">
    <div id="player-area"><div id="player"></div></div>
  </div>

  <div id="controls">
    <select id="playlistSelect"></select>
    
    <div class="controls-row">
      <div class="player-buttons">
        <button onclick="prev()" title="前へ">
          <svg viewBox="0 0 24 24"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg>
        </button>
        <button onclick="togglePlay()" id="playBtn" title="再生/一時停止">
          <svg id="icon-play" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
          <svg id="icon-pause" viewBox="0 0 24 24" style="display:none;"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
        </button>
        <button onclick="next()" title="次へ">
          <svg viewBox="0 0 24 24"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg>
        </button>
        <button onclick="toggleShuffle()" id="shuffleBtn" title="シャッフル">
          <svg viewBox="0 0 24 24"><path d="M10.59 9.17L5.41 4 4 5.41l5.17 5.17 1.42-1.41zM14.5 4l2.04 2.04L4 18.59 5.41 20 17.96 7.46 20 9.5V4h-5.5zm.33 9.41l-1.41 1.41 3.13 3.13L14.5 20H20v-5.5l-2.04 2.04-3.13-3.13z"/></svg>
          <span id="shuffleText">オフ</span>
        </button>
      </div>
      <div class="volume-wrapper">
        🔊 <input type="range" id="volume" min="0" max="100" value="50">
      </div>
    </div>
  </div>

  <div id="list"></div>
</div>

let playlist = [];
let current = 0;
let player;
let shuffle = false;
let isApiReady = false; 

function onYouTubeIframeAPIReady() {
  isApiReady = true;
  tryInitPlayer();
}

function initApp() {
  const firstPlaylistName = Object.keys(myMusicData)[0];
  playlist = myMusicData[firstPlaylistName];
  initSelector();
  createList(); 
  tryInitPlayer();
}

function tryInitPlayer() {
  if (isApiReady && playlist.length > 0 && !player) {
    player = new YT.Player('player', {
      host: 'https://www.youtube-nocookie.com',
      width: '100%',
      height: '100%',
      videoId: playlist[0].videoId,
      playerVars: { 'playsinline': 1, 'rel': 0 },
      events: {
        'onReady': (event) => {
          event.target.setVolume(50);
          player.cueVideoById({
            videoId: playlist[0].videoId,
            startSeconds: playlist[0].start
          });
          updateUI();
        },
        'onStateChange': onPlayerStateChange
      }
    });
  }
}

function initSelector() {
  const sel = document.getElementById("playlistSelect");
  sel.innerHTML = ""; 
  Object.keys(myMusicData).forEach(name => {
    const opt = document.createElement("option");
    opt.value = name;
    opt.textContent = name;
    sel.appendChild(opt);
  });
  sel.onchange = () => {
    playlist = myMusicData[sel.value];
    current = 0;
    createList();
    if(player && player.loadVideoById){
        player.loadVideoById({
          videoId: playlist[0].videoId,
          startSeconds: playlist[0].start
        });
    }
    updateUI();
  };
}

function loadTrack(i) {
  current = i;
  const item = playlist[i];
  if(player && player.loadVideoById){
      player.loadVideoById({
        videoId: item.videoId,
        startSeconds: item.start
      });
  }
  updateUI();
}

// アイコンの切り替えを連動させる
function togglePlay() {
  if(!player) return;
  const s = player.getPlayerState();
  if (s === 1) {
    player.pauseVideo();
    document.getElementById("icon-play").style.display = "block";
    document.getElementById("icon-pause").style.display = "none";
  } else {
    player.playVideo();
    document.getElementById("icon-play").style.display = "none";
    document.getElementById("icon-pause").style.display = "block";
  }
}

function next() {
  let nextIdx = shuffle ? Math.floor(Math.random() * playlist.length) : (current + 1) % playlist.length;
  loadTrack(nextIdx);
}

function prev() {
  let prevIdx = (current - 1 + playlist.length) % playlist.length;
  loadTrack(prevIdx);
}

function toggleShuffle() {
  shuffle = !shuffle;
  document.getElementById("shuffleText").textContent = shuffle ? "オン" : "オフ";
  document.getElementById("shuffleBtn").style.color = shuffle ? "#FFC547" : "#fff";
}

function onPlayerStateChange(event) {
  if (event.data === YT.PlayerState.PLAYING) {
    // 再生中は一時停止アイコンにする
    document.getElementById("icon-play").style.display = "none";
    document.getElementById("icon-pause").style.display = "block";
    
    clearInterval(window._timer);
    window._timer = setInterval(() => {
      const item = playlist[current];
      const now = player.getCurrentTime();
      if (item.end && now >= item.end) {
        next();
      }
    }, 1000);
  } else {
    // 停止中などは再生アイコンにする
    document.getElementById("icon-play").style.display = "block";
    document.getElementById("icon-pause").style.display = "none";
    clearInterval(window._timer);
  }
}

function createList() {
  const list = document.getElementById("list");
  list.innerHTML = "";
  playlist.forEach((item, i) => {
    const div = document.createElement("div");
    div.className = "item";
    
    const num = document.createElement("span");
    num.className = "track-number";
    num.textContent = String(i + 1).padStart(2, '0');
    
    const title = document.createElement("span");
    title.textContent = item.title;
    
    div.appendChild(num);
    div.appendChild(title);
    
    div.onclick = () => loadTrack(i);
    list.appendChild(div);
  });
  updateUI();
}

function updateUI() {
  const items = document.querySelectorAll(".item");
  items.forEach((el, i) => {
    el.classList.toggle("active", i === current);
  });
}

document.getElementById("volume").oninput = e => {
  if(player) player.setVolume(e.target.value);
};

window.onload = function() {
  try {
    initApp();
  } catch (error) {
    console.error("Error:", error);
  }
};
</script>
</body>
</html>
