<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nana's Music Player</title>

<style>
/* 全体の背景 */
body { margin:0; font-family:sans-serif; background:#111; color:white; }

/* 動画表示エリア */
#player-area {
  width:100%;
  aspect-ratio:16/9;
  background:black;
  position:relative;
}

/* スクロールした時に現れるミニプレイヤー */
#player-area.mini {
  position:fixed;
  width:240px;
  height:135px;
  bottom:20px;
  right:20px;
  z-index:1000;
  box-shadow: 0 4px 15px rgba(0,0,0,0.5);
  border: 2px solid #63AED9;
}

/* 操作パネル */
#controls {
  display:flex;
  flex-wrap:wrap;
  align-items: center;
  gap:10px;
  padding:15px;
  background:#222;
  position:sticky;
  top:0;
  border-bottom: 2px solid #63AED9;
}

button, select {
  padding:10px 15px;
  font-size:14px;
  cursor: pointer;
  border-radius: 5px;
  border: none;
  background: #333;
  color: white;
}

/* ボタンにマウスを乗せた時 */
button:hover {
  background: #444;
}

/* 再生中の曲を目立たせる色（黄色） */
.item.active { 
  background: #FFC547 !important; 
  color: #000 !important; 
  font-weight: bold;
}

#volume { width:100px; accent-color: #63AED9; }

#list { padding:10px; }
.item {
  padding:15px;
  background:#333;
  margin-bottom:8px;
  border-radius:10px;
  cursor: pointer;
  transition: 0.2s;
}
.item:hover { background: #444; }
</style>
</head>

<body>

<div id="player-area">
  <div id="player"></div>
</div>

<div id="controls">
  <select id="playlistSelect"></select>
  <button onclick="prev()">⏮ 前へ</button>
  <button onclick="togglePlay()" id="playBtn">▶/⏸ 再生/一時停止</button>
  <button onclick="next()">⏭ 次へ</button>
  <button onclick="toggleShuffle()" id="shuffleBtn">🔀 シャッフル: オフ</button>
  🔊 <input type="range" id="volume" min="0" max="100" value="50">
</div>

<div id="list"></div>

<script src="https://www.youtube.com/iframe_api"></script>
