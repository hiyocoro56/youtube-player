<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nana's Music Player</title>

<style>
/* 全体の背景 */
body { margin:0; font-family:sans-serif; background:#111; color:white; }

/* 動画表示エリア */
#player-area {
  width:100%;
  aspect-ratio:16/9;
  background:black;
  position:relative;
}

/* スクロールした時に現れるミニプレイヤー */
#player-area.mini {
  position:fixed;
  width:240px;
  height:135px;
  bottom:20px;
  right:20px;
  z-index:1000;
  box-shadow: 0 4px 15px rgba(0,0,0,0.5);
  border: 2px solid #63AED9;
}

/* 操作パネル */
#controls {
  display:flex;
  flex-wrap:wrap;
  align-items: center;
  gap:10px;
  padding:15px;
  background:#222;
  position:sticky;
  top:0;
  border-bottom: 2px solid #63AED9;
}

button, select {
  padding:10px 15px;
  font-size:14px;
  cursor: pointer;
  border-radius: 5px;
  border: none;
  background: #333;
  color: white;
}

button:hover { background: #444; }

/* 再生中の曲を目立たせる色（黄色） */
.item.active { 
  background: #FFC547 !important; 
  color: #000 !important; 
  font-weight: bold;
}

#volume { width:100px; accent-color: #63AED9; }

#list { padding:10px; }
.item {
  padding:15px;
  background:#333;
  margin-bottom:8px;
  border-radius:10px;
  cursor: pointer;
  transition: 0.2s;
}
.item:hover { background: #444; }
</style>
</head>

<body>

<div id="player-area">
  <div id="player"></div>
</div>

<div id="controls">
  <select id="playlistSelect"></select>
  <button onclick="prev()">⏮ 前へ</button>
  <button onclick="togglePlay()" id="playBtn">▶/⏸ 再生/一時停止</button>
  <button onclick="next()">⏭ 次へ</button>
  <button onclick="toggleShuffle()" id="shuffleBtn">🔀 シャッフル: オフ</button>
  🔊 <input type="range" id="volume" min="0" max="100" value="50">
</div>

<div id="list"></div>

<script src="https://www.youtube.com/iframe_api"></script>

<script>
let playlists = {};
let playlist = [];
let current = 0;
let player;
let shuffle = false;
let isApiReady = false; 

// 1. まず曲リスト（JSON）を読み込む
fetch("playlists.json")
.then(res => res.json())
.then(data => {
  playlists = data;
  initSelector();
  const firstPlaylistName = Object.keys(playlists)[0];
  playlist = playlists[firstPlaylistName];
  tryInitPlayer();
})
.catch(error => {
  console.error("リストの読み込みに失敗しました:", error);
  document.getElementById("list").innerHTML = "<p style='color:red;'>※リストデータ（JSON）の読み込みに失敗しました。カンマのズレなどがないか確認してください。</p>";
});

// YouTubeの準備ができた時に自動で呼ばれる
function onYouTubeIframeAPIReady() {
  isApiReady = true;
  tryInitPlayer();
}

// データとYouTube、両方の準備ができたらプレイヤーを作る
function tryInitPlayer() {
  if (isApiReady && playlist.length > 0 && !player) {
    player = new YT.Player('player', {
      host: 'https://www.youtube-nocookie.com', // ← Cookieエラー対策
      width: '100%',
      height: '100%',
      videoId: playlist[0].videoId,
      playerVars: {
        'playsinline': 1,
        'rel': 0
      },
      events: {
        'onReady': (event) => {
          event.target.setVolume(50);
          createList();
          
          // 自動再生ブロック対策：最初はサムネイルを表示して待機する
          current = 0;
          player.cueVideoById({
            videoId: playlist[0].videoId,
            startSeconds: playlist[0].start
          });
          updateUI();
        },
        'onStateChange': onPlayerStateChange
      }
    });
  }
}

function initSelector() {
  const sel = document.getElementById("playlistSelect");
  sel.innerHTML = ""; // 初期化
  Object.keys(playlists).forEach(name => {
    const opt = document.createElement("option");
    opt.value = name;
    opt.textContent = name;
    sel.appendChild(opt);
  });
  sel.onchange = () => {
    playlist = playlists[sel.value];
    current = 0;
    createList();
    // リストが切り替わった時はすぐに再生開始
    if(player && player.loadVideoById){
        player.loadVideoById({
          videoId: playlist[0].videoId,
          startSeconds: playlist[0].start
        });
    }
    updateUI();
  };
}

function loadTrack(i) {
  current = i;
  const item = playlist[i];
  if(player && player.loadVideoById){
      player.loadVideoById({
        videoId: item.videoId,
        startSeconds: item.start
      });
  }
  updateUI();
}

function togglePlay() {
  if(!player) return;
  const s = player.getPlayerState();
  if (s === 1) player.pauseVideo();
  else player.playVideo();
}

function next() {
  let nextIdx;
  if (shuffle) {
    nextIdx = Math.floor(Math.random() * playlist.length);
  } else {
    nextIdx = (current + 1) % playlist.length;
  }
  loadTrack(nextIdx);
}

function prev() {
  let prevIdx = (current - 1 + playlist.length) % playlist.length;
  loadTrack(prevIdx);
}

function toggleShuffle() {
  shuffle = !shuffle;
  document.getElementById("shuffleBtn").textContent = shuffle ? "🔀 シャッフル: オン" : "🔀 シャッフル: オフ";
}

function onPlayerStateChange(event) {
  if (event.data === YT.PlayerState.PLAYING) {
    clearInterval(window._timer);
    window._timer = setInterval(() => {
      const item = playlist[current];
      const now = player.getCurrentTime();
      if (item.end && now >= item.end) {
        next();
      }
    }, 1000);
  } else {
    clearInterval(window._timer);
  }
}

function createList() {
  const list = document.getElementById("list");
  list.innerHTML = "";
  playlist.forEach((item, i) => {
    const div = document.createElement("div");
    div.className = "item";
    div.textContent = (i + 1) + ". " + item.title;
    div.onclick = () => loadTrack(i);
    list.appendChild(div);
  });
  updateUI();
}

  const items = document.querySelectorAll(".item");
  items.forEach((el, i
